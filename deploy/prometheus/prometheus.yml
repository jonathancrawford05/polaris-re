# Prometheus scrape configuration for the local docker-compose metrics stack.
#
# Scrapes the Polaris RE API's dependency-free /metrics endpoint (ADR-135). In
# docker-compose the API is reachable at the service name `api` on port 8000.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: polaris-re-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - "api:8000"
        labels:
          service: polaris-re
