apiVersion: v1
kind: Service
metadata:
  name: {{ include "polaris-re.fullname" . }}
  labels:
    {{- include "polaris-re.labels" . | nindent 4 }}
  {{- if .Values.metrics.enabled }}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: {{ .Values.metrics.port | quote }}
    prometheus.io/path: {{ .Values.metrics.path | quote }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "polaris-re.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
