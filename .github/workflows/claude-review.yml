# =============================================================================
# Polaris RE — Claude Code Review
# =============================================================================
# Trigger:
#   - Manual only: Actions tab → "Claude Code Review" → "Run workflow"
#     Optionally specify a PR number to review. Leave blank to skip the
#     automated prompt and rely solely on the @claude comment trigger.
#   - On-demand: comment `@claude <instructions>` on any PR or issue
#
# Prerequisites:
#   - ANTHROPIC_API_KEY must be set as a repository secret
#   - Repository default token permissions must allow pull-request writes
#     (Settings → Actions → General → Workflow permissions → Read and write)
#
# Cost guidance:
#   - Each run costs ~$1–2 depending on PR size.
#   - Manual trigger ensures you only run when you explicitly choose to.
#   - Monitor spend at console.anthropic.com/settings/billing
# =============================================================================

name: Claude Code Review

on:
  # Manual trigger from the Actions tab — primary entry point
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (e.g. 1). Leave blank for comment-only use."
        required: false
        type: string
      extra_instructions:
        description: "Any extra instructions for this review run (optional)."
        required: false
        type: string

  # On-demand: comment @claude on any PR or issue
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Cancel in-progress review runs for the same ref on new triggers
concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude Code Review

    runs-on: ubuntu-latest

    permissions:
      contents: read          # read code, CLAUDE.md, REVIEW.md
      pull-requests: write    # post review comments on PRs
      issues: write           # respond to @claude in issue/PR comments
      id-token: write         # OIDC
      actions: read           # read CI results for context

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ------------------------------------------------------------------
      # Log run context — helps diagnose trigger and input issues
      # ------------------------------------------------------------------
      - name: Log run context
        run: |
          echo "===== Claude Code Review — Run Context ====="
          echo "Trigger:        ${{ github.event_name }}"
          echo "Actor:          ${{ github.actor }}"
          echo "Ref:            ${{ github.ref }}"
          echo "SHA:            ${{ github.sha }}"
          echo "PR number:      ${{ github.event.inputs.pr_number || github.event.issue.number || 'n/a' }}"
          echo "Extra instructions provided: ${{ github.event.inputs.extra_instructions != '' }}"
          echo "============================================"

      - name: Run Claude Code Review
        id: claude-review
        # continue-on-error: if Claude hits max-turns the workflow shows a
        # yellow warning rather than hard red. Any partial review comments
        # already posted to the PR are preserved.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Explicit GITHUB_TOKEN gives Claude write access to post PR comments.
          github_token: ${{ secrets.GITHUB_TOKEN }}

          prompt: |
            Please review the changes in this PR for the Polaris RE project
            (Python-native life reinsurance cash flow projection engine).
            ${{ github.event.inputs.pr_number && format('Focus on PR #{0}.', github.event.inputs.pr_number) || '' }}
            ${{ github.event.inputs.extra_instructions || '' }}

            ## Approach — follow this order to minimise tool calls:
            1. Read REVIEW.md — defines the P0/P1/P2 severity framework.
               Read it once, do not re-read.
            2. Read the PR diff — focus on changed files only.
            3. Only open individual source files if a specific finding needs
               deeper context to confirm. Do not read every file in full.
            4. Write your complete review as a single PR comment.

            ## What to flag:
            - **[P0]** Actuarial calculation errors, vectorisation violations
              (loops over policies/time steps instead of NumPy), Pydantic v2
              contract bypasses, float == comparisons, silent exception
              suppression, hardcoded assumption values in product/treaty code
            - **[P1]** Python 3.12 typing violations (Optional[X], List[X]
              etc.), new actuarial calculations without closed-form tests,
              wrong error type raised, np.array() without explicit dtype
            - **[P2]** Optional suggestions — non-blocking

            ## What to ignore:
            Import order, line length, whitespace — Ruff enforces these.

            ## Format each finding as:
            **[P0/P1/P2 — Category]** `file.py:line`
            Brief description and suggested fix.

            If no material issues are found, say so briefly and close the review.

          claude_args: |
            --max-turns 50
            --model claude-sonnet-4-6

      # ------------------------------------------------------------------
      # Log outcome — always runs so you can see results even on failure
      # ------------------------------------------------------------------
      - name: Log Claude execution result
        if: always()
        run: |
          echo "===== Claude Execution Result ====="
          echo "Step outcome:   ${{ steps.claude-review.outcome }}"
          echo "Step result:    ${{ steps.claude-review.result }}"
          echo "Session ID:     ${{ steps.claude-review.outputs.session_id || 'not available' }}"
          echo "==================================="
