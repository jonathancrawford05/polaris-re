# =============================================================================
# Polaris RE — Claude Code Review
# =============================================================================
# Trigger:
#   - Manual only: Actions tab → "Claude Code Review" → "Run workflow"
#     Optionally specify a PR number to review. Leave blank for comment-only use.
#   - On-demand: comment `@claude <instructions>` on any PR or issue
#
# Prerequisites:
#   - ANTHROPIC_API_KEY must be set as a repository secret
#   - Repository default token permissions must allow pull-request writes
#     (Settings → Actions → General → Workflow permissions → Read and write)
#
# Cost guidance:
#   - Each run costs ~$1–2 depending on PR size.
#   - Manual trigger ensures you only run when you explicitly choose to.
#   - Monitor spend at console.anthropic.com/settings/billing
#
# Visibility:
#   - --output-format stream-json streams every tool call, reasoning step,
#     and text output to stdout in real time. Visible in Actions → job logs
#     under "Run Claude Code Review" regardless of whether PR comment posting
#     succeeds. This is the primary debugging mechanism.
#   - For large PRs (many files), pass extra_instructions to scope the review
#     to specific paths, e.g. "focus only on src/polaris_re/products/"
# =============================================================================

name: Claude Code Review

on:
  # Manual trigger from the Actions tab — primary entry point
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review (e.g. 1). Leave blank for comment-only use."
        required: false
        type: string
      extra_instructions:
        description: "Scope or focus instructions, e.g. 'focus only on src/polaris_re/products/'. Use this on large PRs to avoid context exhaustion."
        required: false
        type: string

  # On-demand: comment @claude on any PR or issue
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Cancel in-progress review runs for the same ref on new triggers
concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude Code Review

    runs-on: ubuntu-latest

    permissions:
      contents: read          # read code, CLAUDE.md, REVIEW.md
      pull-requests: write    # post review comments on PRs
      issues: write           # respond to @claude in issue/PR comments
      id-token: write         # OIDC
      actions: read           # read CI results for context

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ------------------------------------------------------------------
      # Log run context — helps diagnose trigger and input issues
      # ------------------------------------------------------------------
      - name: Log run context
        run: |
          echo "===== Claude Code Review — Run Context ====="
          echo "Trigger:        ${{ github.event_name }}"
          echo "Actor:          ${{ github.actor }}"
          echo "Ref:            ${{ github.ref }}"
          echo "SHA:            ${{ github.sha }}"
          echo "PR number:      ${{ github.event.inputs.pr_number || github.event.issue.number || 'n/a' }}"
          echo "Extra instructions: ${{ github.event.inputs.extra_instructions || 'none' }}"
          echo "============================================"

      # ------------------------------------------------------------------
      # Run Claude — stream-json pipes every tool call and text output to
      # stdout so the full review is visible in this step's log even if
      # the PR comment posting step fails or context is exhausted.
      # ------------------------------------------------------------------
      - name: Run Claude Code Review
        id: claude-review
        # continue-on-error: workflow shows yellow warning rather than hard
        # red failure if Claude hits max-turns or context limits.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          prompt: |
            Please review the changes in this PR for the Polaris RE project
            (Python-native life reinsurance cash flow projection engine).
            ${{ github.event.inputs.pr_number && format('Focus on PR #{0}.', github.event.inputs.pr_number) || '' }}
            ${{ github.event.inputs.extra_instructions || '' }}

            ## IMPORTANT — context budget
            This is a large codebase. To avoid exhausting your context window:
            - Read REVIEW.md first (severity framework). Read it once only.
            - Do NOT read CLAUDE.md in full — it is for interactive sessions.
            - Read the PR diff summary only — do not fetch full file contents
              unless a specific finding absolutely requires it.
            - Write your review after reading the diff. Do not defer.
            - If the diff is very large, review the highest-risk files first
              (products/, reinsurance/, analytics/) and note any files skipped.

            ## What to flag:
            - **[P0]** Actuarial calculation errors, vectorisation violations
              (loops over policies/time steps instead of NumPy), Pydantic v2
              contract bypasses, float == comparisons, silent exception
              suppression, hardcoded assumption values in product/treaty code
            - **[P1]** Python 3.12 typing violations (Optional[X], List[X]
              etc.), new actuarial calculations without closed-form tests,
              wrong error type raised, np.array() without explicit dtype
            - **[P2]** Optional suggestions — non-blocking

            ## What to ignore:
            Import order, line length, whitespace — Ruff enforces these.

            ## Format each finding as:
            **[P0/P1/P2 — Category]** `file.py:line`
            Brief description and suggested fix.

            If no material issues are found, say so briefly and close the review.

          claude_args: |
            --max-turns 50
            --model claude-sonnet-4-6
            --output-format stream-json

      # ------------------------------------------------------------------
      # Log outcome — step status plus session ID for resuming if needed.
      # The actual review content is visible in the step above via
      # stream-json. outcome/conclusion are status flags only.
      # ------------------------------------------------------------------
      - name: Log Claude execution result
        if: always()
        run: |
          echo "===== Claude Execution Result ====="
          echo "Step outcome:      ${{ steps.claude-review.outcome }}"
          echo "Step result:       ${{ steps.claude-review.result }}"
          echo "Session ID:        ${{ steps.claude-review.outputs.session_id || 'not available' }}"
          echo ""
          echo "NOTE: Full review output (tool calls, reasoning, text) is"
          echo "visible in the 'Run Claude Code Review' step above via"
          echo "stream-json — expand that step to read the review content."
          echo "==================================="
