# =============================================================================
# Polaris RE — Claude Code Review
# =============================================================================
# Triggers:
#   - Automatically on every PR opened/updated targeting `main`
#   - On-demand by commenting `@claude` on any PR or issue
#
# Prerequisites:
#   - ANTHROPIC_API_KEY must be set as a repository secret
#
# Notes:
#   - Review runs on your GitHub-hosted runner; only API calls leave to Anthropic
#   - Does NOT approve or merge PRs — advisory comments only
#   - Fork PRs from external contributors will NOT receive reviews (no secret
#     access by GitHub's design — this is the safe default for public repos)
#   - To trigger a review on an existing PR, comment `@claude` on it
#   - If max-turns is hit, the step is marked continue-on-error so any partial
#     review already posted to the PR is preserved and the workflow shows a
#     warning rather than a hard failure
# =============================================================================

name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]

  # On-demand: comment @claude on any PR or issue
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Cancel in-progress review runs for the same PR on new pushes
concurrency:
  group: claude-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude Code Review

    # Skip draft PRs for automated reviews (on-demand @claude still works)
    if: >
      github.event_name == 'issue_comment' ||
      github.event_name == 'pull_request_review_comment' ||
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)

    runs-on: ubuntu-latest

    permissions:
      contents: read          # read code and CLAUDE.md
      pull-requests: write    # post review comments
      issues: write           # respond to @claude in issue comments
      id-token: write         # OIDC (may be needed by some auth flows)
      actions: read           # allow Claude to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        # continue-on-error: if Claude hits max-turns, the workflow shows a
        # warning (yellow) rather than a hard failure (red). Any partial review
        # comments already posted to the PR are preserved.
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Automated review prompt — only active on pull_request events.
          # For @claude mentions, Claude uses the comment text as its prompt.
          #
          # EFFICIENCY GUIDANCE: Be deliberate with tool calls.
          #   1. Read the PR diff first (it is already in your context).
          #   2. Read REVIEW.md and CLAUDE.md once for standards — do not re-read.
          #   3. Only fetch individual source files if a specific issue requires
          #      deeper inspection — do not read every changed file in full.
          #   4. Write the complete review in a single comment when ready.
          #   This keeps turn usage low and the review focused.
          prompt: |
            Please review the changes in this PR for the Polaris RE project
            (Python-native life reinsurance cash flow projection engine).

            ## Approach — follow this order to minimise tool calls:
            1. Read REVIEW.md — this defines the P0/P1/P2 severity framework
               and what to flag vs. ignore. Read it once, do not re-read.
            2. Read the PR diff — focus on changed files only.
            3. Only open individual source files if a specific finding needs
               deeper context to confirm. Do not read every file in full.
            4. Write your complete review as a single PR comment.

            ## What to flag:
            - **[P0]** Actuarial calculation errors, vectorisation violations
              (loops over policies/time steps instead of NumPy), Pydantic v2
              contract bypasses, float == comparisons, silent exception suppression,
              hardcoded assumption values in product/treaty code
            - **[P1]** Python 3.12 typing violations (Optional[X], List[X] etc.),
              new actuarial calculations without closed-form tests, wrong error
              type raised, np.array() without explicit dtype
            - **[P2]** Optional suggestions — non-blocking

            ## What to ignore:
            Import order, line length, whitespace — Ruff enforces these automatically.

            ## Format each finding as:
            **[P0/P1/P2 — Category]** `file.py:line`
            Brief description and suggested fix.

            If no material issues are found, say so briefly and close the review.

          claude_args: |
            --max-turns 50
            --model claude-sonnet-4-6
