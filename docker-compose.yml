# docker-compose.yml — Local development convenience
#
# Usage:
#   Start dev shell:    docker compose run --rm dev bash
#   Run tests:          docker compose run --rm dev uv run pytest tests/
#   Run lint:           docker compose run --rm dev make lint
#   Run notebook:       docker compose up notebook   (then open http://localhost:8888)

services:

  # -------------------------------------------------------------------------
  # dev — interactive development and CI-equivalent local testing
  # -------------------------------------------------------------------------
  dev:
    build:
      context: .
      target: dev
    image: polaris-re:dev
    volumes:
      # Live mount source for edit-without-rebuild workflow
      - ./src:/app/src
      - ./tests:/app/tests
      - ./notebooks:/app/notebooks
      # Mount local actuarial data directory (set POLARIS_DATA_DIR in .env)
      - ${POLARIS_DATA_DIR:-./data}:/data:ro
    environment:
      - POLARIS_DATA_DIR=/data
      - POLARIS_LOG_LEVEL=${POLARIS_LOG_LEVEL:-INFO}
    working_dir: /app

  # -------------------------------------------------------------------------
  # api — FastAPI server (simulates a deployed pod / Kubernetes service)
  #
  # Usage:
  #   docker compose up api              (foreground, see logs)
  #   docker compose up -d api           (background)
  #   docker compose down                (stop and remove)
  #
  # Then call from host:
  #   curl http://localhost:8000/health
  #   curl http://localhost:8000/docs     (Swagger UI in browser)
  #   curl -X POST http://localhost:8000/api/v1/price -H 'Content-Type: application/json' -d @tests/fixtures/sample_price_request.json
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      target: runtime
    image: polaris-re:runtime
    command: >
      python -m uvicorn polaris_re.api.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --log-level info
    ports:
      - "8000:8000"
    volumes:
      # Live-mount src so code changes reflect without rebuilding the image
      - ./src:/app/src
      - ${POLARIS_DATA_DIR:-./data}:/data:ro
    environment:
      - POLARIS_DATA_DIR=/data
      - POLARIS_LOG_LEVEL=${POLARIS_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # -------------------------------------------------------------------------
  # prometheus — scrapes the API's dependency-free /metrics endpoint (ADR-135)
  #
  # Usage:
  #   docker compose up -d api prometheus grafana
  #   open http://localhost:9090   (Prometheus)
  #   open http://localhost:3000   (Grafana; anonymous admin, no login)
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  # -------------------------------------------------------------------------
  # grafana — dashboards over the Prometheus datasource (auto-provisioned)
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # -------------------------------------------------------------------------
  # notebook — JupyterLab server for validation notebooks
  # -------------------------------------------------------------------------
  notebook:
    build:
      context: .
      target: dev
    image: polaris-re:dev
    command: >
      uv run jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --NotebookApp.token=''
        --NotebookApp.password=''
        notebooks/
    ports:
      - "8888:8888"
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ${POLARIS_DATA_DIR:-./data}:/data:ro
    environment:
      - POLARIS_DATA_DIR=/data
