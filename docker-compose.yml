# docker-compose.yml — Local development convenience
#
# Usage:
#   Start dev shell:    docker compose run --rm dev bash
#   Run tests:          docker compose run --rm dev uv run pytest tests/
#   Run lint:           docker compose run --rm dev make lint
#   Run notebook:       docker compose up notebook   (then open http://localhost:8888)

services:

  # -------------------------------------------------------------------------
  # dev — interactive development and CI-equivalent local testing
  # -------------------------------------------------------------------------
  dev:
    build:
      context: .
      target: dev
    image: polaris-re:dev
    volumes:
      # Live mount source for edit-without-rebuild workflow
      - ./src:/app/src
      - ./tests:/app/tests
      - ./notebooks:/app/notebooks
      # Mount local actuarial data directory (set POLARIS_DATA_DIR in .env)
      - ${POLARIS_DATA_DIR:-./data}:/data:ro
    environment:
      - POLARIS_DATA_DIR=/data
      - POLARIS_LOG_LEVEL=${POLARIS_LOG_LEVEL:-INFO}
    working_dir: /app

  # -------------------------------------------------------------------------
  # api — FastAPI server (simulates a deployed pod / Kubernetes service)
  #
  # Usage:
  #   docker compose up api              (foreground, see logs)
  #   docker compose up -d api           (background)
  #   docker compose down                (stop and remove)
  #
  # Then call from host:
  #   curl http://localhost:8000/health
  #   curl http://localhost:8000/docs     (Swagger UI in browser)
  #   curl -X POST http://localhost:8000/api/v1/price -H 'Content-Type: application/json' -d @tests/fixtures/sample_price_request.json
  # -------------------------------------------------------------------------
  api:
    build:
      context: .
      target: runtime
    image: polaris-re:runtime
    command: >
      python -m uvicorn polaris_re.api.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --log-level info
    ports:
      - "8000:8000"
    volumes:
      # Live-mount src so code changes reflect without rebuilding the image
      - ./src:/app/src
      - ${POLARIS_DATA_DIR:-./data}:/data:ro
    environment:
      - POLARIS_DATA_DIR=/data
      - POLARIS_LOG_LEVEL=${POLARIS_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # -------------------------------------------------------------------------
  # notebook — JupyterLab server for validation notebooks
  # -------------------------------------------------------------------------
  notebook:
    build:
      context: .
      target: dev
    image: polaris-re:dev
    command: >
      uv run jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --NotebookApp.token=''
        --NotebookApp.password=''
        notebooks/
    ports:
      - "8888:8888"
    volumes:
      - ./src:/app/src
      - ./notebooks:/app/notebooks
      - ${POLARIS_DATA_DIR:-./data}:/data:ro
    environment:
      - POLARIS_DATA_DIR=/data
